{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>
        {% block title %}
            Title
        {% endblock %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    {% block extra_css %} {% endblock %}
</head>

<body>
<header>
    {% block header %}
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'shop:home' %}">Home</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'shop:list_products' %}">Product list</a>
                        </li>

                        <li><a class="btn btn-primary" href="{% url 'shop:add_product' %}">Add product</a></li>
                        <li><a class="btn btn-secondary" href="{% url 'shop:find_and_edit_product' %}">Edit product</a>
                        </li>
                        <li><a class="btn btn-danger" href="{% url 'shop:find_and_delete_product' %}">Delete product</a>
                        </li>
                        <form class="d-flex" method="get" action="
                            {% if request.path == '/shop/find_and_edit_product' %}
                                {% url 'shop:find_and_edit_product' %}
                            {% elif request.path == '/shop/find_and_delete_product' %}
                                {% url 'shop:find_and_delete_product' %}
                            {% else %}
                                {% url 'shop:list_products' %}
                            {% endif %}">
                            <input class="form-control me-2" name="q" value="{{ q }}" type="search" placeholder="Search"
                                   aria-label="Search">
                            <button class="btn btn-outline-success" type="submit">Search</button>
                        </form>
                        <li class="nav-item dropdown">

                        </li>

                    </ul>


                </div>
            </div>
        </nav>
    {% endblock %}
</header>

<main>
    {% block content %}

    {% endblock %}
</main>

<footer>
    {% block footer %}

    {% endblock %}
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
